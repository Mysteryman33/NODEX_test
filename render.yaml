services:
  - type: web
    name: secondbrain
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 60
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set this manually in Render dashboard
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: DB_PATH
        value: /var/data/secondbrain.db
    disk:
      name: secondbrain-data
      mountPath: /var/data
      sizeGB: 1
